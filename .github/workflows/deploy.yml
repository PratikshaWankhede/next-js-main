name: Deploy Next.js App

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t nextjs-app .

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/next-js-main

            git pull origin master

            docker stop nextjs-container || true
            docker rm nextjs-container || true

            docker build -t nextjs-app .

            export $(aws secretsmanager get-secret-value \
              --secret-id nextjs-prod-secrets \
              --region us-east-1 \
              --query SecretString \
              --output text | jq -r 'to_entries|map("\(.key)=\(.value)")|.[]')

            docker run -d -p 3000:3000 --name nextjs-container nextjs-app
